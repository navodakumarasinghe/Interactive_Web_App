<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login & Sign Up | FlavorFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">

    <style>

        body {

            background: url('https://images.unsplash.com/photo-1543353071-873f17a7a088?w=1600') no-repeat center center fixed;

            background-size: cover;

            height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            font-family: 'Poppins', sans-serif;

            overflow: hidden;

        }



        .auth-overlay {

            position: absolute;

            top: 0; left: 0; width: 100%; height: 100%;

            background: rgba(0, 0, 0, 0.6);

            z-index: 0;

        }



        .auth-card {

            background: rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            border-radius: 25px;

            padding: 40px;

            width: 100%;

            max-width: 400px;

            z-index: 1;

            box-shadow: 0 15px 35px rgba(0,0,0,0.3);

            animation: slideIn 0.8s ease-out;

            color: white;

        }



        @keyframes slideIn {

            from { opacity: 0; transform: translateY(30px); }

            to { opacity: 1; transform: translateY(0); }

        }



        .form-control {

            background: rgba(255, 255, 255, 0.1) !important;

            border: 1px solid rgba(255, 255, 255, 0.3) !important;

            color: white !important;

            border-radius: 12px;

            padding: 12px;

        }



        .form-control::placeholder { color: rgba(255,255,255,0.6); }



        .form-control:focus {

            background: rgba(255, 255, 255, 0.2) !important;

            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);

            border-color: #ffc107 !important;

        }



        .btn-auth {

            background: #ffc107;

            color: #000;

            font-weight: bold;

            border-radius: 12px;

            padding: 12px;

            transition: 0.3s;

            width: 100%;

            border: none;

            margin-top: 20px;

        }



        .btn-auth:hover {

            background: #ff9800;

            transform: scale(1.03);

            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);

        }



        .toggle-link {

            color: #ffc107;

            cursor: pointer;

            text-decoration: none;

            font-weight: bold;

        }



        .auth-title {

            font-weight: 800;

            text-align: center;

            margin-bottom: 30px;

            letter-spacing: 1px;

        }

    </style>

</head>

<body>



<div class="auth-overlay"></div>


<div class="auth-card" id="loginBox">
    <a href="index.html" style="text-decoration: none; color: inherit;">
        <h2 class="auth-title">🥘 FLAVOR<span class="text-warning">FLOW</span></h2>
    </a>
    <h4 class="text-center mb-4">Welcome Back!</h4>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label class="form-label small">Email Address</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label small">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
        </div>
        
        <p id="errorMsg" class="text-danger small text-center d-none">Invalid email or password!</p>

        <button type="submit" class="btn-auth shadow">LOGIN</button>
    </form>
    
    <p class="text-center mt-4 small">
        Don't have an account? <span class="toggle-link" onclick="toggleAuth()">Sign Up</span>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function toggleAuth() {
        const login = document.getElementById('loginBox');
        const signup = document.getElementById('signupBox');
        login.classList.toggle('d-none');
        signup.classList.toggle('d-none');
    }

    function handleLogin(event) {
        event.preventDefault(); 

        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        const errorText = document.getElementById('errorMsg');

        
        const validEmail = "admin@gmail.com";
        const validPassword = "1234";

        if (email === validEmail && pass === validPassword) {
       
            errorText.classList.add('d-none');
            
            Swal.fire({
                title: 'Success!',
                text: 'Login successful. Redirecting...',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'index.html';
            });
        } else {
         
            errorText.classList.remove('d-none');
            
         
            document.getElementById('loginEmail').style.borderColor = "#ff4d4d";
            document.getElementById('loginPassword').style.borderColor = "#ff4d4d";
        }
    }
</script>


<div class="auth-card d-none" id="signupBox">

    <h2 class="auth-title">🥘 FLAVOR<span class="text-warning">FLOW</span></h2>

    <h4 class="text-center mb-4">Create Account</h4>

    

    <form onsubmit="event.preventDefault(); window.location.href='index.html';">

        <div class="mb-3">

            <label class="form-label small">Full Name</label>

            <input type="text" class="form-control" placeholder="Navoda Kumarasinghe" required>

        </div>

        <div class="mb-3">

            <label class="form-label small">Email Address</label>

            <input type="email" class="form-control" placeholder="example@mail.com" required>

        </div>

        <div class="mb-3">

            <label class="form-label small">Password</label>

            <input type="password" class="form-control" placeholder="••••••••" required>

        </div>

        <button type="submit" class="btn-auth shadow">SIGN UP</button>

    </form>

    

    <p class="text-center mt-4 small">

        Already have an account? <span class="toggle-link" onclick="toggleAuth()">Login</span>

    </p>

</div>







<script>

    function toggleAuth() {

        const login = document.getElementById('loginBox');

        const signup = document.getElementById('signupBox');

        

        login.classList.toggle('d-none');

        signup.classList.toggle('d-none');

    }

</script>



</body>

</html>
